agent:
  name: "lisa01"
  role: "Infrastructure Specialist"
  description: "Docker, Server, Monitoring, Backups"

llm:
  planner: "opus-4.6"
  executor: "mistral-small3.2"
  fallback:
    - "llama3.1:8b"
  local_only: false
  ollama_url: "http://10.40.10.90:11434"

communication:
  mattermost:
    token_vault_path: "lisa01/mattermost/MM_TOKEN"
    channels:
      - "echo_log"
      - "infra-alerts"
    home_channel: "infra-alerts"
    url: "http://10.40.10.83:8065"

security:
  nss_enabled: true
  mars_threshold: 0.7
  approval_level: "RISKY"
