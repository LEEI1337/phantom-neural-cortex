    - "joe"
  nss_gateway_url: "http://localhost:11337"
  nss_guardian_url: "http://localhost:11338"
  nss_governance_url: "http://localhost:11339"

tools:
  allowed:
    - "docker_mcp"
    - "file"
    - "system"
    - "knowledge"
    - "http_health_check"
    - "get_docker_status"
    - "service_logs"
