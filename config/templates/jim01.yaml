agent:
  name: "jim01"
  role: "Web & DevOps Specialist"
  description: "Web, API, CI/CD, Git"

llm:
  planner: "opus-4.6"
  executor: "mistral-small3.2"
  fallback:
    - "llama3.1:8b"
    - "deepseek-coder-v2:16b"
  local_only: false
  ollama_url: "http://10.40.10.90:11434"

communication:
  mattermost:
    token_vault_path: "jim01/mattermost/MM_TOKEN"
    channels:
      - "echo_log"
      - "dev-ops"
    home_channel: "dev-ops"
    url: "http://10.40.10.83:8065"

security:
  nss_enabled: true
  mars_threshold: 0.7
  approval_level: "RISKY"
  killswitch_owners:
    - "joe"

tools:
  allowed:
    - "file"
    - "system"
    - "knowledge"
    - "git_status"
    - "git_commit"
    - "deploy"
    - "http_request"
  blocked:
    - "cli_bridges"

memory:
  rag_enabled: true
  persist_learnings: true
  context_max_tokens: 16384

rules_path: "./rules/"
skills_path: "./skills/"
echoLog_url: "http://10.40.10.82:8085"
